<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>TaskMaster</h1>
            <div class="user-info">
                <span id="user-name">Loading...</span>
                <button id="logout-btn" class="btn-small">Logout</button>
            </div>
        </header>

        <div class="dashboard-container">
            <div class="sidebar">
                <div class="add-task-container">
                    <h2>Add New Task</h2>
                    <form id="task-form">
                        <div class="form-group">
                            <label for="task-name">Task Name</label>
                            <input type="text" id="task-name" required>
                        </div>
                        <div class="form-group">
                            <label for="task-description">Description</label>
                            <textarea id="task-description" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="task-priority">Priority</label>
                            <select id="task-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="error-message" id="task-error"></div>
                        <button type="submit" class="btn">Add Task</button>
                    </form>
                </div>

                <div class="filter-container">
                    <h3>Filter Tasks</h3>
                    <div class="form-group">
                        <label for="filter-priority">By Priority</label>
                        <select id="filter-priority">
                            <option value="all">All Priorities</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filter-status">By Status</label>
                        <select id="filter-status">
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="tasks-header">
                    <h2>Your Tasks</h2>
                    <div class="tasks-count">
                        <span id="tasks-count">0</span> tasks
                    </div>
                </div>

                <div id="tasks-container" class="tasks-container">
                    <div class="empty-state">
                        <p>Loading tasks...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="todo.js"></script>
</body>

</html>
